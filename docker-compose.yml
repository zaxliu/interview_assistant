version: '3.8'
services:
  wintalent-proxy:
    image: node:18-alpine
    working_dir: /app
    command: ["node", "scripts/wintalent-proxy.mjs"]
    environment:
      - WINTALENT_PROXY_HOST=0.0.0.0
      - WINTALENT_PROXY_PORT=8787
    volumes:
      - .:/app:ro
    restart: unless-stopped

  metrics:
    image: node:18-alpine
    working_dir: /app
    command: ["node", "scripts/metrics-server.mjs"]
    environment:
      - METRICS_HOST=0.0.0.0
      - METRICS_PORT=8788
      - METRICS_STORAGE_FILE=/data/events.ndjson
      - METRICS_SESSION_SECRET=${METRICS_SESSION_SECRET:-change-me}
      - METRICS_ADMIN_FEISHU_USER_IDS=${METRICS_ADMIN_FEISHU_USER_IDS:-}
      - METRICS_FEISHU_APP_ID=${METRICS_FEISHU_APP_ID:-}
      - METRICS_FEISHU_APP_SECRET=${METRICS_FEISHU_APP_SECRET:-}
    volumes:
      - .:/app:ro
      - metrics-data:/data
    restart: unless-stopped

  interview-assistant:
    depends_on:
      - wintalent-proxy
      - metrics
    build:
      context: .
      args:
        VITE_AI_API_KEY: ${VITE_AI_API_KEY}
        VITE_AI_MODEL: ${VITE_AI_MODEL}
        VITE_FEISHU_APP_ID: ${VITE_FEISHU_APP_ID}
        VITE_FEISHU_APP_SECRET: ${VITE_FEISHU_APP_SECRET}
    environment:
      - VITE_AI_BASE_URL=${VITE_AI_BASE_URL:-https://api.openai.com}
      - VITE_WINTALENT_PROXY_URL=${DOCKER_WINTALENT_PROXY_URL:-http://wintalent-proxy:8787}
      - VITE_METRICS_PROXY_URL=${DOCKER_METRICS_PROXY_URL:-http://metrics:8788}
      - HTTP_PROXY=${DOCKER_HTTP_PROXY:-http://host.docker.internal:7890}
      - HTTPS_PROXY=${DOCKER_HTTPS_PROXY:-http://host.docker.internal:7890}
      - ALL_PROXY=${DOCKER_ALL_PROXY:-http://host.docker.internal:7890}
      - NO_PROXY=${DOCKER_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  metrics-data:
